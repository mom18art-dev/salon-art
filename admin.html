<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salon Art - لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;direction:rtl;background:#080808;color:#f0ece4;min-height:100vh;}
.app{padding-bottom:80px;}
.header{background:linear-gradient(160deg,#0d0d0d,#111008);border-bottom:1px solid #1a1a1a;padding:18px 18px 14px;display:flex;align-items:center;justify-content:space-between;max-width:540px;margin:0 auto;}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo-sm{width:38px;height:38px;}
.brand-sm{font-family:'Playfair Display',serif;font-size:16px;font-weight:900;color:#f0ece4;letter-spacing:2px;}
.brand-sm span{color:#c9a84c;}
.header-sub{font-size:11px;color:#333;margin-top:1px;}
.total-badge{background:linear-gradient(135deg,#c9a84c,#e8c96a);color:#0d0d0d;font-weight:900;font-size:13px;padding:6px 16px;border-radius:50px;}

/* TABS */
.main-tabs{display:flex;gap:0;max-width:540px;margin:0 auto;border-bottom:1px solid #1a1a1a;}
.main-tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:700;color:#333;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;}
.main-tab.active{color:#c9a84c;border-bottom-color:#c9a84c;}

.tab-content{display:none;}
.tab-content.active{display:block;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 18px 0;max-width:540px;margin:0 auto;}
.stat{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:14px 8px;text-align:center;}
.stat-n{font-size:22px;font-weight:900;color:#c9a84c;}
.stat-l{font-size:10px;color:#333;margin-top:3px;}

/* WEEKLY STATS */
.weekly{padding:14px 18px 0;max-width:540px;margin:0 auto;}
.week-card{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:16px;margin-bottom:10px;}
.week-title{font-size:12px;color:#555;margin-bottom:12px;letter-spacing:2px;}
.week-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a;}
.week-row:last-child{border:none;}
.week-day{font-size:13px;color:#888;}
.week-count{font-size:13px;font-weight:700;color:#c9a84c;}
.week-bar-wrap{flex:1;margin:0 12px;background:#1a1a1a;border-radius:4px;height:6px;}
.week-bar{height:6px;border-radius:4px;background:linear-gradient(to left,#c9a84c,#e8c96a);}
.revenue-box{background:#111;border:1px solid #c9a84c22;border-radius:12px;padding:16px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;}
.revenue-box span{font-size:13px;color:#666;}
.revenue-box strong{font-size:20px;font-weight:900;color:#c9a84c;}

/* SECTION */
.section{padding:14px 18px 0;max-width:540px;margin:0 auto;}
.sec-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-title{font-size:10px;font-weight:700;color:#333;letter-spacing:3px;}
.refresh-btn{background:#111;border:1px solid #1a1a1a;border-radius:6px;color:#444;font-family:'Tajawal',sans-serif;font-size:11px;padding:5px 12px;cursor:pointer;}
.refresh-btn:hover{border-color:#c9a84c55;color:#c9a84c;}

.day-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:7px 13px;color:#333;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .18s;}
.day-tab:hover{color:#888;}
.day-tab.active{background:#c9a84c;border-color:#c9a84c;color:#0d0d0d;font-weight:900;}

/* CARD */
.card{background:#111;border:1px solid #1a1a1a;border-radius:14px;padding:16px;margin-bottom:10px;}
.card.late{border-color:#c0404033;background:#110808;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.day-badge{font-size:10px;color:#444;background:#1a1a1a;border-radius:5px;padding:2px 8px;margin-bottom:5px;display:inline-block;}
.c-name{font-size:17px;font-weight:900;color:#f0ece4;}
.tag{font-size:10px;border-radius:50px;padding:2px 9px;margin-right:4px;display:inline-block;margin-top:3px;}
.tag-ok{color:#4a9a4a;background:#0a1a0a;border:1px solid #1a3a1a;}
.tag-late{color:#e05050;background:#1a0808;border:1px solid #3a1010;}
.time-badge{background:#1a1a1a;border-radius:9px;padding:6px 14px;font-size:14px;font-weight:700;color:#c9a84c;white-space:nowrap;flex-shrink:0;}
.service-badge{font-size:11px;color:#888;background:#1a1a1a;border-radius:6px;padding:3px 10px;margin-top:4px;display:inline-block;}
.price-badge{font-size:11px;color:#4a9a4a;background:#0a1a0a;border:1px solid #1a3a1a;border-radius:6px;padding:3px 10px;margin-top:4px;margin-right:4px;display:inline-block;}
.card-info{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;margin-top:8px;}
.info-item{font-size:12px;color:#333;}
.actions{display:flex;gap:7px;}
.wa-btn{flex:1;background:linear-gradient(135deg,#128c3a,#1aad48);color:#fff;border:none;border-radius:9px;padding:11px 10px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:900;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.wa-btn:hover:not(:disabled){transform:translateY(-1px);}
.wa-btn:disabled{background:#0a1a0f;color:#1a4a1a;cursor:default;}
.cancel-btn{background:#1a0808;border:1px solid #3a1010;border-radius:9px;padding:11px 14px;color:#e05050;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.cancel-btn:hover{background:#2a0808;}
.late-action{width:100%;margin-top:8px;background:#c04040;border:none;border-radius:9px;padding:11px;color:#fff;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:900;cursor:pointer;}

/* DISABLED DAYS */
.disable-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px;}
.disable-btn{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:10px 4px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;color:#555;cursor:pointer;transition:all .18s;text-align:center;width:100%;}
.disable-btn:hover{border-color:#e05050aa;color:#e05050;}
.disable-btn.disabled{background:#2a0808;border-color:#e0505055;color:#e05050;}
.disable-info{font-size:12px;color:#333;margin-bottom:14px;line-height:1.7;}

/* WAITLIST */
.wait-card{background:#111;border:1px solid #c9a84c22;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.wait-info{flex:1;}
.wait-name{font-size:15px;font-weight:700;color:#f0ece4;}
.wait-detail{font-size:12px;color:#444;margin-top:3px;}
.notify-btn{background:linear-gradient(135deg,#128c3a,#1aad48);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}

.empty{text-align:center;padding:44px 0;border:1px dashed #1a1a1a;border-radius:14px;}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.3;}
.empty p{color:#222;font-size:14px;}

.loading-screen{position:fixed;inset:0;background:#080808;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.loading-screen svg{animation:spin 1.5s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.loading-screen p{margin-top:16px;color:#444;font-size:14px;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#c9a84c,#e8c96a);color:#0d0d0d;padding:12px 28px;border-radius:50px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;z-index:999;white-space:nowrap;display:none;box-shadow:0 4px 24px #c9a84c55;}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <svg width="44" height="44" viewBox="0 0 54 54" fill="none">
    <circle cx="27" cy="27" r="24" stroke="#222" stroke-width="3"/>
    <path d="M27 3 A24 24 0 0 1 51 27" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
  </svg>
  <p>جاري تحميل الحجوزات...</p>
</div>

<div class="app" id="mainApp" style="display:none">

  <div class="header">
    <div class="logo-row">
      <svg class="logo-sm" viewBox="0 0 54 54" fill="none">
        <line x1="27" y1="27" x2="6" y2="10" stroke="#c9a84c" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="27" y1="27" x2="6" y2="44" stroke="#c9a84c" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="27" y1="27" x2="48" y2="10" stroke="#e8c96a" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="27" y1="27" x2="48" y2="44" stroke="#e8c96a" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="6" cy="10" r="4.5" stroke="#c9a84c" stroke-width="1.8" fill="#080808"/>
        <circle cx="6" cy="44" r="4.5" stroke="#c9a84c" stroke-width="1.8" fill="#080808"/>
        <circle cx="48" cy="10" r="4.5" stroke="#e8c96a" stroke-width="1.8" fill="#080808"/>
        <circle cx="48" cy="44" r="4.5" stroke="#e8c96a" stroke-width="1.8" fill="#080808"/>
        <circle cx="27" cy="27" r="4" fill="#c9a84c"/>
        <circle cx="27" cy="27" r="1.8" fill="#080808"/>
      </svg>
      <div>
        <div class="brand-sm">SALON <span>ART</span></div>
        <div class="header-sub">لوحة التحكم</div>
      </div>
    </div>
    <div class="total-badge" id="totalBadge">0 حجز</div>
  </div>

  <!-- MAIN TABS -->
  <div class="main-tabs">
    <div class="main-tab active" onclick="switchTab('bookings')">📋 الحجوزات</div>
    <div class="main-tab" onclick="switchTab('stats')">📊 الإحصائيات</div>
    <div class="main-tab" onclick="switchTab('waitlist')">⏳ الانتظار</div>
    <div class="main-tab" onclick="switchTab('settings')">⚙️ الإعدادات</div>
  </div>

  <!-- BOOKINGS TAB -->
  <div class="tab-content active" id="tab-bookings">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="st-total">0</div><div class="stat-l">إجمالي</div></div>
      <div class="stat"><div class="stat-n" id="st-pending">0</div><div class="stat-l">لم يُذكَّر</div></div>
      <div class="stat"><div class="stat-n" id="st-reminded">0</div><div class="stat-l">تم التذكير</div></div>
    </div>
    <div class="section" style="margin-top:16px">
      <div class="sec-row">
        <div class="sec-title">الحجوزات</div>
        <button class="refresh-btn" onclick="loadAndRender()">🔄 تحديث</button>
      </div>
      <div class="day-tabs" id="dayTabs"></div>
      <div id="cardsList"></div>
    </div>
  </div>

  <!-- STATS TAB -->
  <div class="tab-content" id="tab-stats">
    <div class="weekly">
      <div class="week-card">
        <div class="week-title">حجوزات الأسبوع</div>
        <div id="weeklyRows"></div>
      </div>
      <div class="revenue-box">
        <span>💰 إجمالي الإيرادات المتوقعة</span>
        <strong id="totalRevenue">0 د.ع</strong>
      </div>
    </div>
  </div>

  <!-- WAITLIST TAB -->
  <div class="tab-content" id="tab-waitlist">
    <div class="section" style="margin-top:16px">
      <div class="sec-title" style="margin-bottom:14px">قائمة الانتظار</div>
      <div id="waitlistCards"></div>
    </div>
  </div>

  <!-- SETTINGS TAB -->
  <div class="tab-content" id="tab-settings">
    <div class="section" style="margin-top:16px">
      <div class="sec-title" style="margin-bottom:10px">تعطيل يوم</div>
      <div class="disable-info">اضغط على اليوم لتعطيله أو تفعيله. الأيام المعطلة لن يقدر الزبائن يحجزون فيها.</div>
      <div class="disable-grid" id="disableGrid"></div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const BIN_ID  = '69f53bd4aaba8821975f4502';
const API_KEY = '$2a$10$xxo3kGCW6jGSoHj3200WmOpkK4wI88Bm9Ac6MBYaMAGMH0k6Ggwum';
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HEADERS = {'Content-Type':'application/json','X-Master-Key':API_KEY};
const DAYS       = ["السبت","الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة"];
const SLOT_ORDER = ["5:00 م","6:00 م","7:00 م","8:00 م","9:00 م","10:00 م","11:00 م"];
const SLOT_HOURS = {"5:00 م":17,"6:00 م":18,"7:00 م":19,"8:00 م":20,"9:00 م":21,"10:00 م":22,"11:00 م":23};

let data={bookings:[],waitlist:[],disabledDays:[]};
let selDay="الكل", activeTab="bookings";

function formatPrice(p){ return Number(p).toLocaleString('ar-IQ')+' د.ع'; }

async function loadData(){
  try{
    const r=await fetch(API_URL,{headers:{'X-Master-Key':API_KEY}});
    const d=await r.json();
    data=d.record;
    if(!data.bookings) data.bookings=[];
    if(!data.waitlist) data.waitlist=[];
    if(!data.disabledDays) data.disabledDays=[];
  }catch{}
}

async function saveData(){
  await fetch(API_URL,{method:'PUT',headers:HEADERS,body:JSON.stringify(data)});
}

function isLate(b){
  const now=new Date();
  const todayName=DAYS[(now.getDay()+6)%7];
  if(b.day!==todayName)return false;
  const h=SLOT_HOURS[b.slot];if(!h)return false;
  const st=new Date();st.setHours(h,0,0,0);
  return (now-st)>15*60*1000;
}
function lateMin(b){
  const now=new Date();
  const h=SLOT_HOURS[b.slot];if(!h)return 0;
  const st=new Date();st.setHours(h,0,0,0);
  return Math.floor((now-st)/60000);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.main-tab').forEach((el,i)=>{
    el.classList.toggle('active',['bookings','stats','waitlist','settings'][i]===tab);
  });
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}

function openWA(phone,msg){
  const clean=phone.replace(/\D/g,'');
  const intl=clean.startsWith('0')?'964'+clean.slice(1):clean;
  window.open(`https://wa.me/${intl}?text=${encodeURIComponent(msg)}`,'_blank');
}

async function remind(id){
  const b=data.bookings.find(x=>x.id===id);if(!b)return;
  b.reminded=true;
  await saveData();
  const msg=`السلام عليكم ${b.name} 👋\n\n🔔 *تذكير بموعدك في Salon Art*\n\n✂️ الخدمة: *${b.service}*\n📅 اليوم: *${b.day}*\n⏰ الساعة: *${b.slot}*\n💰 السعر: *${formatPrice(b.price)}*\n\n⚠️ التأخر أكثر من 15 دقيقة يلغي حجزك.\n\nنشوفك قريب! 🌟`;
  openWA(b.phone,msg);
  render();
  showToast(`✅ تم إرسال تذكير لـ ${b.name}`);
}

async function cancelBooking(id){
  const b=data.bookings.find(x=>x.id===id);
  data.bookings=data.bookings.filter(x=>x.id!==id);
  await saveData();render();
  showToast(`🗑️ تم إلغاء موعد ${b?.name}`);
}

async function cancelLate(id){
  const b=data.bookings.find(x=>x.id===id);
  data.bookings=data.bookings.filter(x=>x.id!==id);
  await saveData();render();
  showToast(`⛔ أُلغي حجز ${b?.name} بسبب التأخر`);
}

async function notifyWait(id){
  const w=data.waitlist.find(x=>x.id===id);if(!w)return;
  const msg=`السلام عليكم ${w.name} 👋\n\n🎉 *تفرغ وقت في Salon Art ليوم ${w.day}!*\n\nروح احجز الحين قبل ما يمتلئ:\n👉 mom18art-dev.github.io/salon-art/customer.html\n\nSalon Art ✂️`;
  openWA(w.phone,msg);
  data.waitlist=data.waitlist.filter(x=>x.id!==id);
  await saveData();render();
  showToast(`✅ تم إبلاغ ${w.name}`);
}

async function toggleDay(day){
  if(!data.disabledDays) data.disabledDays=[];
  if(data.disabledDays.includes(day)){
    data.disabledDays=data.disabledDays.filter(d=>d!==day);
    showToast(`✅ تم تفعيل يوم ${day}`);
  }else{
    data.disabledDays.push(day);
    showToast(`🚫 تم تعطيل يوم ${day}`);
  }
  await saveData();render();
}

function renderBookings(){
  const active=data.bookings.filter(b=>!b.cancelled);
  const reminded=active.filter(b=>b.reminded).length;
  document.getElementById('totalBadge').textContent=`${active.length} حجز`;
  document.getElementById('st-total').textContent=active.length;
  document.getElementById('st-pending').textContent=active.length-reminded;
  document.getElementById('st-reminded').textContent=reminded;

  const tabs=document.getElementById('dayTabs');tabs.innerHTML='';
  ["الكل",...DAYS].forEach(d=>{
    const cnt=d==="الكل"?active.length:active.filter(b=>b.day===d).length;
    const btn=document.createElement('button');
    btn.className='day-tab'+(selDay===d?' active':'');
    btn.textContent=`${d} (${cnt})`;
    btn.onclick=()=>{selDay=d;renderBookings();};
    tabs.appendChild(btn);
  });

  const filtered=selDay==="الكل"?active:active.filter(b=>b.day===selDay);
  const sorted=[...filtered].sort((a,b)=>{
    if(a.day!==b.day)return DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
    return SLOT_ORDER.indexOf(a.slot)-SLOT_ORDER.indexOf(b.slot);
  });

  const waIcon=`<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

  const list=document.getElementById('cardsList');
  if(!sorted.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">✂️</div><p>ما في حجوزات ${selDay!=="الكل"?"ليوم "+selDay:""}</p></div>`;
    return;
  }
  list.innerHTML=sorted.map(b=>{
    const late=isLate(b);const mins=late?lateMin(b):0;
    return `<div class="card${late?' late':''}">
      <div class="card-top">
        <div style="flex:1;min-width:0">
          <div class="day-badge">📅 ${b.day}</div>
          <div><span class="c-name">${b.name}</span>
          ${b.reminded?'<span class="tag tag-ok">✓ ذُكِّر</span>':''}
          ${late?`<span class="tag tag-late">⚠️ تأخر ${mins}د</span>`:''}</div>
          <div style="margin-top:5px">
            <span class="service-badge">${b.service||''}</span>
            <span class="price-badge">💰 ${formatPrice(b.price||0)}</span>
          </div>
        </div>
        <div class="time-badge" style="margin-right:8px">⏰ ${b.slot}</div>
      </div>
      <div class="card-info">
        <div class="info-item">📞 ${b.phone}</div>
        <div class="info-item">🕐 ${b.bookedAt}</div>
      </div>
      <div class="actions">
        <button class="wa-btn" onclick="remind('${b.id}')" ${b.reminded?'disabled':''}>
          ${waIcon} ${b.reminded?'تم التذكير':'أرسل تذكير'}
        </button>
        <button class="cancel-btn" onclick="cancelBooking('${b.id}')">إلغاء</button>
      </div>
      ${late?`<button class="late-action" onclick="cancelLate('${b.id}')">⛔ إلغاء بسبب التأخر (${mins} دقيقة)</button>`:''}
    </div>`;
  }).join('');
}

function renderStats(){
  const active=data.bookings.filter(b=>!b.cancelled);
  const totalRevenue=active.reduce((s,b)=>s+(b.price||0),0);
  document.getElementById('totalRevenue').textContent=totalRevenue.toLocaleString('ar-IQ')+' د.ع';
  const max=Math.max(...DAYS.map(d=>active.filter(b=>b.day===d).length),1);
  document.getElementById('weeklyRows').innerHTML=DAYS.map(d=>{
    const cnt=active.filter(b=>b.day===d).length;
    const rev=active.filter(b=>b.day===d).reduce((s,b)=>s+(b.price||0),0);
    const pct=Math.round((cnt/max)*100);
    return `<div class="week-row">
      <span class="week-day">${d}</span>
      <div class="week-bar-wrap"><div class="week-bar" style="width:${pct}%"></div></div>
      <span class="week-count">${cnt} حجز${rev>0?' • '+rev.toLocaleString():''}  </span>
    </div>`;
  }).join('');
}

function renderWaitlist(){
  const list=document.getElementById('waitlistCards');
  if(!data.waitlist||!data.waitlist.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">⏳</div><p>قائمة الانتظار فارغة</p></div>`;
    return;
  }
  list.innerHTML=data.waitlist.map(w=>`
    <div class="wait-card">
      <div class="wait-info">
        <div class="wait-name">${w.name}</div>
        <div class="wait-detail">📞 ${w.phone} • 📅 ${w.day}</div>
      </div>
      <button class="notify-btn" onclick="notifyWait('${w.id}')">📲 أبلغه</button>
    </div>`).join('');
}

function renderSettings(){
  const g=document.getElementById('disableGrid');g.innerHTML='';
  DAYS.forEach(d=>{
    const disabled=(data.disabledDays||[]).includes(d);
    const btn=document.createElement('button');
    btn.className='disable-btn'+(disabled?' disabled':'');
    btn.textContent=disabled?`${d} 🚫`:d;
    btn.onclick=()=>toggleDay(d);
    g.appendChild(btn);
  });
}

function render(){
  if(activeTab==='bookings') renderBookings();
  else if(activeTab==='stats') renderStats();
  else if(activeTab==='waitlist') renderWaitlist();
  else if(activeTab==='settings') renderSettings();
}

async function loadAndRender(){ await loadData(); render(); }

(async()=>{
  await loadAndRender();
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  setInterval(loadAndRender,60000);
})();
</script>
</body>
</html>
