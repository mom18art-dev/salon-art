<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salon Art - احجز موعدك</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;direction:rtl;background:#f5f0ea;min-height:100vh;}
.app{min-height:100vh;padding-bottom:70px;}
.header{background:#111;color:#f5f0ea;padding:30px 20px 24px;text-align:center;}
.header-icon{font-size:36px;display:block;margin-bottom:8px;}
.header h1{font-size:28px;font-weight:900;letter-spacing:1px;}
.header h1 span{color:#c9a84c;}
.header p{font-size:13px;color:#777;margin-top:5px;}
.section{padding:22px 18px 0;max-width:460px;margin:0 auto;}
.lbl{font-size:11px;font-weight:700;color:#999;letter-spacing:2px;margin-bottom:10px;}
.inp{width:100%;background:#fff;border:1.5px solid #e2dbd1;border-radius:12px;
  padding:14px 16px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:500;
  color:#111;outline:none;transition:border-color .2s;margin-bottom:11px;display:block;}
.inp::placeholder{color:#ccc;}
.inp:focus{border-color:#c9a84c;}
.days-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.day-btn{background:#fff;border:1.5px solid #e2dbd1;border-radius:10px;
  padding:11px 4px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;
  color:#666;cursor:pointer;transition:all .18s;text-align:center;width:100%;}
.day-btn:hover{border-color:#c9a84c66;color:#c9a84c;}
.day-btn.sel{background:#111;border-color:#111;color:#c9a84c;}
.slots-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.slot-btn{background:#fff;border:1.5px solid #e2dbd1;border-radius:10px;
  padding:13px 4px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;
  color:#555;cursor:pointer;transition:all .18s;text-align:center;width:100%;}
.slot-btn:hover:not(.bkd):not(.sel){border-color:#c9a84c;color:#c9a84c;}
.slot-btn.sel{background:#111;border-color:#111;color:#c9a84c;font-weight:900;}
.slot-btn.bkd{opacity:.35;cursor:not-allowed;font-size:11px;position:relative;}
.slot-btn.bkd::after{content:"محجوز";display:block;font-size:9px;color:#e05555;}
.book-btn{width:100%;padding:16px;background:#111;color:#c9a84c;
  font-family:'Tajawal',sans-serif;font-size:16px;font-weight:900;
  border:none;border-radius:13px;cursor:pointer;transition:all .2s;}
.book-btn:hover:not(:disabled){background:#2a2a2a;transform:translateY(-1px);}
.book-btn:disabled{opacity:.3;cursor:not-allowed;}
.success{background:#fff;border:1.5px solid #e2dbd1;border-radius:16px;
  padding:28px 22px;text-align:center;animation:pop .3s ease;}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.success-icon{font-size:48px;margin-bottom:12px;}
.success h2{font-size:21px;font-weight:900;margin-bottom:8px;}
.success p{font-size:14px;color:#888;line-height:1.7;}
.detail-box{background:#f5f0ea;border-radius:10px;padding:14px 18px;margin:16px 0;text-align:right;}
.detail-row{margin-bottom:10px;}
.detail-row span{display:block;font-size:12px;color:#999;margin-bottom:2px;}
.detail-row strong{font-size:15px;color:#111;font-weight:900;}
.warn-box{background:#fff8e1;border:1.5px solid #f0c040;border-radius:10px;
  padding:13px 16px;margin-top:14px;font-size:13px;color:#7a5c00;line-height:1.8;text-align:right;}
.new-btn{background:transparent;border:1.5px solid #111;border-radius:10px;
  padding:11px 22px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;margin-top:14px;transition:all .18s;}
.new-btn:hover{background:#111;color:#f5f0ea;}
.hidden{display:none;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  background:#111;color:#c9a84c;padding:11px 26px;border-radius:50px;
  font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;
  z-index:999;white-space:nowrap;display:none;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-icon">✂️</span>
    <h1>Salon <span>Art</span></h1>
    <p>احجز موعدك • من 5 مساءً لـ 11 ليلاً</p>
  </div>

  <!-- Form -->
  <div id="formView">
    <div class="section">
      <div class="lbl">بياناتك</div>
      <input class="inp" id="nameInp" placeholder="اسمك الكريم..." maxlength="30"/>
      <input class="inp" id="phoneInp" placeholder="رقم هاتفك (مثال: 07701234567)" maxlength="13" type="tel"/>
    </div>

    <div class="section" style="margin-top:18px">
      <div class="lbl">اختار اليوم</div>
      <div class="days-grid" id="daysGrid"></div>
    </div>

    <div class="section" id="slotsSection" style="margin-top:18px;display:none">
      <div class="lbl" id="slotsLabel">الساعات المتاحة</div>
      <div class="slots-grid" id="slotsGrid"></div>
    </div>

    <div class="section" style="margin-top:22px">
      <button class="book-btn" id="bookBtn" disabled onclick="handleBook()">
        أدخل بياناتك واختار اليوم والساعة
      </button>
    </div>
  </div>

  <!-- Success -->
  <div id="successView" class="hidden">
    <div class="section" style="margin-top:30px">
      <div class="success">
        <div class="success-icon">✅</div>
        <h2>تم الحجز بنجاح!</h2>
        <div class="detail-box">
          <div class="detail-row"><span>الاسم</span><strong id="s-name"></strong></div>
          <div class="detail-row"><span>اليوم</span><strong id="s-day"></strong></div>
          <div class="detail-row"><span>الساعة</span><strong id="s-slot"></strong></div>
          <div class="detail-row"><span>رقم الهاتف</span><strong id="s-phone"></strong></div>
        </div>
        <p>راح توصلك رسالة تذكير قبل ساعة من موعدك 🔔</p>
        <div class="warn-box">
          ⚠️ <strong>تنبيه مهم:</strong> إذا تأخرت أكثر من <strong>15 دقيقة</strong> عن موعدك، راح يُلغى الحجز تلقائياً وينحجز لشخص ثاني.
        </div>
        <button class="new-btn" onclick="resetForm()">حجز موعد ثاني</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SLOTS = ["5:00 م","6:00 م","7:00 م","8:00 م","9:00 م","10:00 م","11:00 م"];
const DAYS  = ["السبت","الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة"];
const STORAGE_KEY = "saloart_bookings_v1";
const EXPIRE_MS   = 24 * 60 * 60 * 1000; // 24 ساعة

let bookings = [];
let selectedDay = null;
let selectedSlot = null;

function loadBookings() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    const now = Date.now();
    // حذف الحجوزات اللي عمرها أكثر من 24 ساعة
    bookings = raw.filter(b => (now - b.id) < EXPIRE_MS);
    // حذف الحجوزات اللي تجاوزت ربع ساعة بدون حضور (cancelled)
    bookings = bookings.filter(b => !b.cancelled);
    saveBookings();
  } catch { bookings = []; }
}

function saveBookings() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(bookings));
}

function isBooked(day, slot) {
  return bookings.some(b => b.day === day && b.slot === slot);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function updateBookBtn() {
  const name  = document.getElementById('nameInp').value.trim();
  const phone = document.getElementById('phoneInp').value.trim();
  const btn   = document.getElementById('bookBtn');
  if (name && phone && selectedDay && selectedSlot) {
    btn.disabled = false;
    btn.textContent = `✔ احجز ${selectedDay} الساعة ${selectedSlot}`;
  } else {
    btn.disabled = true;
    btn.textContent = 'أدخل بياناتك واختار اليوم والساعة';
  }
}

function renderDays() {
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  DAYS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (selectedDay === d ? ' sel' : '');
    btn.textContent = d;
    btn.onclick = () => { selectedDay = d; selectedSlot = null; renderDays(); renderSlots(); updateBookBtn(); };
    grid.appendChild(btn);
  });
}

function renderSlots() {
  const sec  = document.getElementById('slotsSection');
  const lbl  = document.getElementById('slotsLabel');
  const grid = document.getElementById('slotsGrid');
  if (!selectedDay) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  lbl.textContent = `الساعات المتاحة • ${selectedDay}`;
  grid.innerHTML = '';
  SLOTS.forEach(s => {
    const bkd = isBooked(selectedDay, s);
    const btn = document.createElement('button');
    btn.className = 'slot-btn' + (bkd ? ' bkd' : '') + (selectedSlot === s ? ' sel' : '');
    btn.textContent = s;
    if (!bkd) btn.onclick = () => { selectedSlot = s; renderSlots(); updateBookBtn(); };
    grid.appendChild(btn);
  });
}

function handleBook() {
  const name  = document.getElementById('nameInp').value.trim();
  const phone = document.getElementById('phoneInp').value.trim();
  if (!name || !phone || !selectedDay || !selectedSlot) return;
  if (phone.replace(/\D/g,'').length < 9) { showToast('⚠️ رقم الهاتف غير صحيح'); return; }

  const booking = {
    id: Date.now(), name, phone,
    day: selectedDay, slot: selectedSlot,
    bookedAt: new Date().toLocaleTimeString('ar-IQ'),
    reminded: false, cancelled: false
  };
  bookings.push(booking);
  saveBookings();

  document.getElementById('s-name').textContent  = name;
  document.getElementById('s-day').textContent   = selectedDay;
  document.getElementById('s-slot').textContent  = selectedSlot;
  document.getElementById('s-phone').textContent = phone;

  document.getElementById('formView').classList.add('hidden');
  document.getElementById('successView').classList.remove('hidden');
}

function resetForm() {
  selectedDay = null; selectedSlot = null;
  document.getElementById('nameInp').value  = '';
  document.getElementById('phoneInp').value = '';
  loadBookings();
  renderDays(); renderSlots(); updateBookBtn();
  document.getElementById('successView').classList.add('hidden');
  document.getElementById('formView').classList.remove('hidden');
}

// Init
loadBookings();
renderDays();
document.getElementById('nameInp').addEventListener('input', updateBookBtn);
document.getElementById('phoneInp').addEventListener('input', updateBookBtn);
</script>
</body>
</html>
